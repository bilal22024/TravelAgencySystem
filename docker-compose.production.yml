services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.production.example
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:4000/api/v1"
        VITE_APP_NAME: "Travel Agency Management System"
    depends_on:
      - backend
    ports:
      - "8080:80"
